# Service account for OMS pods.
# Annotate with IRSA role ARN to grant AWS permissions (e.g. ECR pull, MSK IAM auth).
# Replace ACCOUNT_ID and REGION with your values.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oms-sa
  namespace: oms
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/oms-eks-role"
