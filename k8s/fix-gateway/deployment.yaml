apiVersion: apps/v1
kind: Deployment
metadata:
  name: fix-gateway
  namespace: oms
  labels:
    app: fix-gateway
spec:
  replicas: 1
  # Sticky session: FIX session state is in-process; use Recreate if upgrading
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fix-gateway
  template:
    metadata:
      labels:
        app: fix-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: oms-sa
      # quickfix 1.15.1 contains x86-only atomic assembly — must run on amd64 nodes
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: fix-gateway
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/oms/fix-gateway:TAG
          imagePullPolicy: Always
          ports:
            - name: fix
              containerPort: 9876
              protocol: TCP
            - name: metrics
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: oms-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: oms-secret
                  key: DATABASE_URL
          startupProbe:
            tcpSocket:
              port: 9876
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # QuickFIX writes store/log files
          volumeMounts:
            - name: fix-store
              mountPath: /tmp/fix
      volumes:
        - name: fix-store
          emptyDir: {}
