apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: oms
  labels:
    app: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      serviceAccountName: oms-sa
      containers:
        - name: ui
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/oms/ui:TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101   # nginx default user
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # nginx needs to write tmp files
