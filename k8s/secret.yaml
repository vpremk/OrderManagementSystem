# TEMPLATE — do NOT commit real values.
# For production use AWS Secrets Manager + External Secrets Operator:
#   https://external-secrets.io/latest/provider/aws-secrets-manager/
#
# Values must be base64-encoded: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: oms-secret
  namespace: oms
type: Opaque
stringData:
  # Full Postgres connection URL (includes password)
  # Production: point to RDS endpoint
  DATABASE_URL: "postgresql://oms:CHANGE_ME@postgres:5432/oms"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_USER: "oms"
  POSTGRES_DB: "oms"

  # Grafana admin password (if deploying in-cluster)
  GF_SECURITY_ADMIN_PASSWORD: "CHANGE_ME"
