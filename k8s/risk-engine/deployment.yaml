apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: oms
  labels:
    app: risk-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: oms-sa
      containers:
        - name: risk-engine
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/oms/risk-engine:TAG
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: oms-config
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
